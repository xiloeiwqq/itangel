<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бесплатный аудит CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .form-container {
            background-color: #f4f5f6;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
        }

        h2 {
            font-size: 32px;
            font-weight: 700;
            color: #000000;
            margin-bottom: 32px;
            letter-spacing: -0.5px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 15px;
            color: #333333;
            margin-bottom: 10px;
            font-weight: 400;
        }

        input[type="text"],
        input[type="tel"] {
            width: 100%;
            padding: 16px 20px;
            border: none;
            border-radius: 12px;
            background-color: #ffffff;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            color: #000000;
            outline: none;
            transition: box-shadow 0.2s ease;
        }

        input::placeholder {
            color: #9ca3af;
        }

        input:focus-within {
            box-shadow: 0 0 0 2px #d1d5db;
        }

        /* Стили для поля телефона */
        .phone-input-wrapper {
            display: flex;
            align-items: center;
            background-color: #ffffff;
            border-radius: 12px;
            padding: 4px 20px;
            transition: box-shadow 0.2s ease;
        }

        .phone-input-wrapper:focus-within {
            box-shadow: 0 0 0 2px #d1d5db;
        }

        input.invalid-field {
            border: 1px solid #ef4444;
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.25) !important;
            outline: none;
        }

        .phone-input-wrapper.invalid {
            border: 1px solid #ef4444;
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.25);
        }

        .phone-input-wrapper.invalid input {
            border: none;
            box-shadow: none;
        }

        .checkbox-group.invalid .checkmark {
            border: 2px solid #ef4444;
            background-color: #fef2f2;
        }

        .invalid-message {
            color: #ef4444;
            font-size: 13px;
            margin-top: 8px;
        }

        .country-select {
            border: none;
            background: transparent;
            font-size: 16px;
            font-weight: 500;
            color: #000;
            cursor: pointer;
            margin-right: 16px;
            outline: none;
            padding: 12px 0;
        }

        .custom-select {
            position: relative;
            margin-right: 16px;
        }

        .select-selected {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 12px 0;
            font-size: 16px;
            font-weight: 500;
            color: #000;
        }

        .select-selected::after {
            content: '';
            display: block;
            width: 1px;
            height: 24px;
            background-color: #e5e7eb;
            position: absolute;
            right: -16px;
        }

        .flag-img {
            width: 20px;
            height: 15px;
            object-fit: cover;
        }

        .chevron-icon {
            width: 12px;
            height: 12px;
            fill: none;
            stroke: #9ca3af;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .select-items {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background-color: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            z-index: 10;
            max-height: 200px;
            overflow-y: auto;
        }

        .select-items div {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            color: #000;
        }

        .select-items div:hover {
            background-color: #f3f4f6;
        }

        .custom-select.open .select-items {
            display: block;
        }

        .country-select:focus {
            box-shadow: none;
        }

        .phone-input-wrapper input {
            padding: 12px 0 12px 16px;
            border-radius: 0;
        }

        .phone-input-wrapper input:focus-within {
            box-shadow: none;
        }

        /* Стили для чекбокса */
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 32px;
            cursor: pointer;
            position: relative;
        }

        .checkbox-group input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .checkmark {
            height: 20px;
            width: 20px;
            background-color: #ffffff;
            border-radius: 4px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }

        .checkbox-group input:checked ~ .checkmark {
            background-color: #1c1c1c;
        }

        .checkmark::after {
            content: "";
            display: none;
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
            margin-bottom: 2px;
        }

        .checkbox-group input:checked ~ .checkmark::after {
            display: block;
        }

        .checkbox-text {
            font-size: 15px;
            color: #000000;
        }

        .checkbox-text a {
            color: #000000;
            text-decoration: none;
            border-bottom: 1px solid #000000;
        }

        /* Кнопка */
        .submit-btn {
            width: 100%;
            background-color: #1c1c1c;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 20px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: background-color 0.2s ease;
        }

        .submit-btn:hover {
            background-color: #333333;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Бесплатный аудит CRM</h2>
        
        <form id="crmForm" novalidate>
            <div class="form-group">
                <label for="name">Имя</label>
                <input type="text" id="name" name="name" placeholder="Введите имя"  pattern="[A-Za-zА-Яа-яЁё\s\-]+" required>
            </div>

            <div class="form-group">
                <label for="phone">Номер телефона</label>
                <div class="phone-input-wrapper">
                    <div class="custom-select">
                        <div class="select-selected" data-value="+7">
                            <img src="https://flagcdn.com/w20/ru.png" alt="RU" class="flag-img"> +7
                            <svg class="chevron-icon" viewBox="0 0 24 24">
                                <path d="M6 9l6 6 6-6"></path>
                            </svg>
                        </div>
                        <div class="select-items">
                            <div data-value="+7"><img src="https://flagcdn.com/w20/ru.png" alt="RU" class="flag-img"> +7</div>
                            <div data-value="+1"><img src="https://flagcdn.com/w20/us.png" alt="US" class="flag-img"> +1</div>
                            <div data-value="+44"><img src="https://flagcdn.com/w20/gb.png" alt="GB" class="flag-img"> +44</div>
                            <div data-value="+49"><img src="https://flagcdn.com/w20/de.png" alt="DE" class="flag-img"> +49</div>
                            <div data-value="+33"><img src="https://flagcdn.com/w20/fr.png" alt="FR" class="flag-img"> +33</div>
                            <div data-value="+39"><img src="https://flagcdn.com/w20/it.png" alt="IT" class="flag-img"> +39</div>
                            <div data-value="+34"><img src="https://flagcdn.com/w20/es.png" alt="ES" class="flag-img"> +34</div>
                            <div data-value="+81"><img src="https://flagcdn.com/w20/jp.png" alt="JP" class="flag-img"> +81</div>
                            <div data-value="+86"><img src="https://flagcdn.com/w20/cn.png" alt="CN" class="flag-img"> +86</div>
                            <div data-value="+91"><img src="https://flagcdn.com/w20/in.png" alt="IN" class="flag-img"> +91</div>
                        </div>
                    </div>
                    <input type="tel" id="phone" name="phone" placeholder="(987) 654 32-10" required>
                </div>
            </div>

            <div class="form-group">
                <label for="company">Название компании</label>
                <input type="text" id="company" name="company" placeholder="Введите название" required>
            </div>

            <label class="checkbox-group">
                <input type="checkbox" name="privacy_accepted" required>
                <span class="checkmark"></span>
                <span class="checkbox-text">Соглашаюсь на обработку <a href="/privacy-policy" target="_top" rel="noopener noreferrer">персональных данных</a></span>
            </label>

            <button type="submit" class="submit-btn">Отправить заявку</button>
        </form>
    </div>

    <script>
const phoneInput = document.getElementById('phone');
const customSelect = document.querySelector('.custom-select');
const selectSelected = document.querySelector('.select-selected');
const selectItems = document.querySelector('.select-items');
const nameInput = document.getElementById('name');

nameInput.addEventListener('input', function(e) {
    e.target.value = e.target.value.replace(
        /[^a-zA-Zа-яА-ЯёЁ\s-]/g,
        ''
    );
});
let selectedValue = '+7';


function updatePlaceholder(){
    if (selectedValue === '+7') {
        phoneInput.placeholder='(987) 654 32-10';
    }
    else if (selectedValue === '+1') {
        phoneInput.placeholder='(123) 456-7890';
    }
    else {
        phoneInput.placeholder='Введите номер телефона';
    }
}

updatePlaceholder();

const form = document.getElementById('crmForm');
const requiredInputs = Array.from(form.querySelectorAll('input[required]'));

function createInvalidMessage(input, text) {
    removeInvalidMessage(input);
    const message = document.createElement('div');
    message.className = 'invalid-message';
    message.textContent = text;

    if (input.name === 'privacy_accepted') {
        input.closest('.checkbox-group')?.append(message);
    } else if (input.id === 'phone') {
        input.closest('.phone-input-wrapper')?.after(message);
    } else {
        input.after(message);
    }
}

function removeInvalidMessage(input) {
    let container = input.parentElement;
    if (input.name === 'privacy_accepted') {
        container = input.closest('.checkbox-group');
    } else if (input.id === 'phone') {
        container = input.closest('.phone-input-wrapper')?.parentElement || input.parentElement;
    }

    const existing = container?.querySelector('.invalid-message');
    if (existing) {
        existing.remove();
    }
    if (input.id === 'phone') {
        const wrapper = input.closest('.phone-input-wrapper');
        if (wrapper?.nextElementSibling?.classList.contains('invalid-message')) {
            wrapper.nextElementSibling.remove();
        }
    }
}

function setInvalidState(input) {
    if (input.id === 'phone') {
        input.closest('.phone-input-wrapper')?.classList.add('invalid');
        return;
    }
    if (input.name === 'privacy_accepted') {
        input.closest('.checkbox-group')?.classList.add('invalid');
    }
    input.classList.add('invalid-field');
}

function clearInvalidState(input) {
    if (input.id === 'phone') {
        input.closest('.phone-input-wrapper')?.classList.remove('invalid');
    }
    if (input.name === 'privacy_accepted') {
        input.closest('.checkbox-group')?.classList.remove('invalid');
    }
    input.classList.remove('invalid-field');
    removeInvalidMessage(input);
}

function clearAllInvalidStates() {
    form.querySelectorAll('.invalid, .invalid-field').forEach((element) => {
        element.classList.remove('invalid', 'invalid-field');
    });
    form.querySelectorAll('.invalid-message').forEach((element) => element.remove());
}

function validateField(input) {
    clearInvalidState(input);
    let valid = true;
    let message = '';

    if (input.name === 'privacy_accepted') {
        if (!input.checked) {
            valid = false;
            message = 'Нужно согласиться с обработкой данных.';
        }
    } else if (input.value.trim() === '') {
        valid = false;
        message = 'Заполните это поле.';
    } else if (input.id === 'name' && !input.value.trim().match(/^[A-Za-zА-Яа-яЁё\s\-]+$/)) {
        valid = false;
        message = 'Введите корректное имя.';
    }

    if (!valid) {
        setInvalidState(input);
        createInvalidMessage(input, message);
    }

    return valid;
}

requiredInputs.forEach((field) => {
    field.addEventListener('input', () => clearInvalidState(field));
    field.addEventListener('change', () => clearInvalidState(field));
});

selectSelected.addEventListener('click', function(){
    customSelect.classList.toggle('open');
});


selectItems.addEventListener('click', function(e){

    const selectedDiv = e.target.closest('[data-value]');
    if(!selectedDiv) return;

    selectedValue = selectedDiv.dataset.value;

    selectSelected.innerHTML =
        selectedDiv.innerHTML +
        `<svg class="chevron-icon" viewBox="0 0 24 24">
            <path d="M6 9l6 6 6-6"></path>
        </svg>`;

    customSelect.classList.remove('open');
    updatePlaceholder();
});


document.addEventListener('click', function(e){
    if (!customSelect.contains(e.target)) {
        customSelect.classList.remove('open');
    }
});


phoneInput.addEventListener('input', function(e){

 let digits = e.target.value.replace(/\D/g,'');

 if(selectedValue === '+7'){

   digits = digits.slice(0,10);

   let x = digits.match(
      /(\d{0,3})(\d{0,3})(\d{0,2})(\d{0,2})/
   );

   e.target.value = !x[2]
      ? x[1]
      : '('+x[1]+') '+x[2]
      +(x[3] ? ' '+x[3] : '')
      +(x[4] ? '-'+x[4] : '');

 }

 else if(selectedValue === '+1'){

    digits = digits.slice(0,10);
    e.target.value = digits;

 }

 else{

    digits = digits.slice(0,15);
    e.target.value = digits;
 }

});


function buildE164Phone(rawPhone, countryCode){
    const digits = rawPhone.replace(/\D/g,'');
    const code = countryCode.replace('+','');
    return `+${code}${digits}`;
}



form.addEventListener('submit', async function(e){

    e.preventDefault();
    clearAllInvalidStates();

    const isValid = requiredInputs.reduce((valid, input) => {
        return validateField(input) && valid;
    }, true);

    if (!isValid) {
        return;
    }

    const payload = {
        name: document.getElementById('name').value.trim(),
        phone: buildE164Phone(
            document.getElementById('phone').value,
            selectedValue
        ),
        company_name: document.getElementById('company').value.trim(),
        privacy_accepted: document.querySelector(
            'input[name="privacy_accepted"]'
        ).checked
    };


    try {

        // Поставь сюда свой endpoint
        const response = await fetch('http://127.0.0.1:8000/api/leads/', {
            method:'POST',
            headers:{
                'Content-Type':'application/json',
                'Accept':'application/json'
            },
            body: JSON.stringify(payload)
        });


        if(!response.ok){
            const errorText = await response.text();
            console.error(errorText);
            alert('Ошибка отправки');
            return;
        }

        const result = await response.json();

        alert('Заявка отправлена');

        this.reset();
        clearAllInvalidStates();

        selectedValue='+7';

        selectSelected.innerHTML=`
            <img src="https://flagcdn.com/w20/ru.png"
                 alt="RU"
                 class="flag-img">
            +7
            <svg class="chevron-icon" viewBox="0 0 24 24">
                <path d="M6 9l6 6 6-6"></path>
            </svg>
        `;

        updatePlaceholder();

        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'crm-form-submitted' }, '*');
        }

    }
    catch(error){
        console.error(error);
        alert('Ошибка соединения с сервером');
    }

});
</script>
</body>
</html>
